name: Auto Google & Bing Indexer

on:
  schedule:
    # Runs daily at 13:00 UTC (Adjust as desired)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  build-and-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.ini from Secret
        run: |
          python -c "import os; data = os.environ.get('CONFIG_INI', ''); f = open('config.ini', 'w'); f.write(data); f.close()"
        env:
          CONFIG_INI: ${{ secrets.CONFIG_INI }}

      - name: Create Service Account File from Secret
        run: |
          python -c "import configparser, os; config = configparser.ConfigParser(); config.read('config.ini'); filename = config.get('DEFAULT', 'SERVICE_ACCOUNT_FILE', fallback='service-account.json'); json_data = os.environ['SERVICE_ACCOUNT_JSON']; f = open(filename, 'w'); f.write(json_data); f.close(); print(f'Created service account file: {filename}')"
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}

      - name: Run Smart Google Indexer
        run: python main.py smart --limit 50

      - name: Run Bing IndexNow
        run: python main.py bing

      - name: Clean up Credentials
        if: always()
        run: |
          python -c "import configparser, os; config = configparser.ConfigParser(); config.read('config.ini') if os.path.exists('config.ini') else None; filename = config.get('DEFAULT', 'SERVICE_ACCOUNT_FILE', fallback='service-account.json') if 'DEFAULT' in config else 'service-account.json'; os.remove(filename) if os.path.exists(filename) else None"
          rm -f config.ini

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article_links.csv indexing.log || true
          git commit -m "chore: auto-update indexing status [skip ci]" || true
          git push || true
